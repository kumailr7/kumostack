services:
  kumostack:
    build: .
    image: kumostackorg/kumostack:latest
    container_name: kumostack
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - LOG_LEVEL=DEBUG
      - S3_PERSIST=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RDS_BASE_PORT=15432
      - DOCKER_NETWORK=kumostack_default  # Docker network for RDS/EKS/ElastiCache/Lambda containers
      - ELASTICACHE_BASE_PORT=16379
    volumes:
      - ./data/s3:/tmp/kumostack-data/s3
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_kumostack/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    image: kumostack-dashboard:latest
    container_name: kumostack-dashboard
    ports:
      - "3003:3000"
    environment:
      - MINISTACK_ENDPOINT=http://kumostack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - MINISTACK_CONTAINER=kumostack
      - DRAWIO_ENDPOINT=http://kumostack-drawio:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      kumostack:
        condition: service_healthy
    restart: unless-stopped

  stackport:
    image: kumostack-stackport:latest
    container_name: kumostack-stackport
    ports:
      - "8082:8080"
    environment:
      - AWS_ENDPOINT_URL=http://kumostack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - STACKPORT_ALLOW_WRITES=true
    depends_on:
      kumostack:
        condition: service_healthy
    restart: unless-stopped

  drawio:
    image: jgraph/drawio:latest
    container_name: kumostack-drawio
    ports:
      - "8083:8080"
    environment:
      - DRAWIO_SERVER_URL=http://localhost:8083
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: kumostack-garage
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    command: /garage server
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3903/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: kumostack-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  vector:
    image: timberio/vector:0.41.1-alpine
    container_name: kumostack-vector
    command: ["--config", "/etc/vector/vector.toml"]
    ports:
      - "8686:8686"
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - MINISTACK_ENDPOINT=http://kumostack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - GARAGE_S3_ENDPOINT=http://kumostack-garage:3900
      - GARAGE_ACCESS_KEY=GK9ef5917d6d47e3bc0daae850
      - GARAGE_SECRET_KEY=f536a78459fc476ea0a2defb7b02bb9cfdf7cd806cfcff8e9f1780cacc5dbffd
    depends_on:
      loki:
        condition: service_started
      kumostack:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: kumostack-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Allow embedding in the dashboard iframe
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: kumostack-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: kumostack-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: kumostack-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kumostack-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: Postgres for RDS (always-on, no Docker-in-Docker needed)
  # Uncomment to have a persistent Postgres available at localhost:5432
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: kumostack-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: mydb
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U admin"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
  loki-data:
  garage-meta:
  garage-data:
