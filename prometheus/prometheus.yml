global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: redis
    scrape_interval: 5s
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: cadvisor
    scrape_interval: 5s
    static_configs:
      - targets: ["cadvisor:8080"]

  # k6 pushes metrics here via experimental-prometheus-rw output.
  # The remote_write receiver is enabled via --web.enable-remote-write-receiver.
  # This job is a placeholder so k6 metrics appear under a named job in Grafana.
  - job_name: k6
    static_configs:
      - targets: []
