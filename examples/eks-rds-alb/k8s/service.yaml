apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: myapp
  labels:
    app: sample-app
spec:
  selector:
    app: sample-app
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8080
      # nodePort is auto-assigned in range 30000-32767
      # Access via: http://localhost:<nodePort>
