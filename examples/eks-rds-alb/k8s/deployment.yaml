apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: myapp
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      # Allow pods to reach KumoStack on the kumostack_default Docker network.
      # Run 'bash kubeconfig.sh' to auto-patch this IP, or set it manually:
      #   docker inspect kumostack --format '{{range $k,$v := .NetworkSettings.Networks}}{{if eq $k "kumostack_default"}}{{$v.IPAddress}}{{end}}{{end}}'
      hostAliases:
        - ip: "172.25.0.2"      # kumostack container IP on kumostack_default — may vary; run kubeconfig.sh to auto-detect
          hostnames:
            - "host.docker.internal"
            - "kumostack.local"

      containers:
        - name: app
          # Alpine + Python + boto3 + psycopg2 — reads secret, connects to RDS
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http

          env:
            # KumoStack endpoint — pods reach the host via host.docker.internal
            - name: AWS_ENDPOINT_URL
              value: "http://host.docker.internal:4566"
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: SECRET_NAME
              value: "rds/myapp/credentials"
            - name: PORT
              value: "8080"

          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install boto3 psycopg2-binary -q
              python3 - <<'PYEOF'
              import os, json, http.server, threading, time, socket
              import boto3, psycopg2

              ENDPOINT = os.environ["AWS_ENDPOINT_URL"]
              SECRET   = os.environ["SECRET_NAME"]
              PORT     = int(os.environ.get("PORT", 8080))

              status = {"secret": "pending", "db": "pending", "db_version": ""}

              def connect():
                  sm = boto3.client("secretsmanager", endpoint_url=ENDPOINT)
                  creds = json.loads(sm.get_secret_value(SecretId=SECRET)["SecretString"])
                  status["secret"] = f"OK — host={creds['host']} port={creds['port']}"

                  conn = psycopg2.connect(
                      host=creds["host"], port=creds["port"],
                      dbname=creds["dbname"], user=creds["username"],
                      password=creds["password"], connect_timeout=5)
                  cur = conn.cursor()
                  cur.execute("SELECT version();")
                  status["db"] = "OK"
                  status["db_version"] = cur.fetchone()[0]
                  conn.close()

              def bg():
                  while True:
                      try:
                          connect()
                      except Exception as e:
                          status["secret"] = f"ERR: {e}" if "secret" in str(e).lower() else status["secret"]
                          status["db"] = f"ERR: {e}"
                      time.sleep(30)

              threading.Thread(target=bg, daemon=True).start()

              class Handler(http.server.BaseHTTPRequestHandler):
                  def log_message(self, *a): pass
                  def do_GET(self):
                      body = json.dumps({
                          "service": "sample-app",
                          "host": socket.gethostname(),
                          "secret_status": status["secret"],
                          "db_status": status["db"],
                          "db_version": status["db_version"],
                      }, indent=2).encode()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(body)

              print(f"Listening on :{PORT}")
              http.server.HTTPServer(("", PORT), Handler).serve_forever()
              PYEOF

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
